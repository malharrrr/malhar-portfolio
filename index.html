<!DOCTYPE html>
<html lang="en">
<head>

  <title>Malhar Bonde | Portfolio</title>
  <link rel="stylesheet" href="/src/style.css" />

<body>

    <div class="input-row">

      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autofocus />
    </div>
  </div>
